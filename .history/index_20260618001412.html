<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar start   -->

    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">


            <a class="navbar-brand d-flex align-items-center w-" href="#">
                <img src="./images/Logo (1).png" alt="Logo" class="logo">
            </a>



            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarContent">

                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Community</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Pricing</a>
                    </li>
                </ul>

                <!-- Register Button -->
                <a href="#" class="btn register-btn">
                    Register Now →
                </a>

            </div>
        </div>
    </nav>

    <div class="row flex-lg-row-reverse align-items-center g-5 py-5">
        <div class="col-10 col-sm-8 col-lg-6"> <img src="./images/Illustration.png" class="d-block mx-lg-auto img-fluid"
                alt="Bootstrap Themes" width="700" height="500" loading="lazy"> </div>
        <div class="col-lg-6">
            <h1 class="display-5 fw-bold text-body-emphasis lh-1 mb-3">Lessons and insights</h1>
            <h1 class="display-5 fw-bold text-body-emphasis lh-1 mb-3 bg">from 8 years</h1>
            <p class="lead">where to grow your business as a photographer: site or social media</p>
            <div class="d-grid gap-2 d-md-flex justify-content-md-start"> <button type="button"
                    class="btn btn-outline-secondary btn-lg px-4 bgcolor">Register</button> </div>
        </div>
    </div>

    <div class="px-4 py-5 my-5 text-center">
        <h1 class="display-5 fw-bold text-body-emphasis">Our Clients</h1>
        <div class="col-lg-6 mx-auto">
            <p class="lead mb-4">We have been working with some Fortune 500+ clients</p>
        </div>
        <div class="d-flex gap-2 justify-content-center py-5"> <button class="btn btn-primary rounded-pill px-3"
                type="button">Primary</button> <button class="btn btn-secondary rounded-pill px-3"
                type="button">Secondary</button> <button class="btn btn-success rounded-pill px-3"
                type="button">Success</button> <button class="btn btn-danger rounded-pill px-3"
                type="button">Danger</button> <button class="btn btn-warning rounded-pill px-3"
                type="button">Warning</button> <button class="btn btn-info rounded-pill px-3"
                type="button">Info</button> <button class="btn btn-light rounded-pill px-3" type="button">Light</button>
            <button class="btn btn-dark rounded-pill px-3" type="button">Dark</button> <button
                class="btn btn-link rounded-pill px-3" type="button">Link</button> </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
